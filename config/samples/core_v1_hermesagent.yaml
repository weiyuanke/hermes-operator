# HermesAgent example with gateway and dashboard
# This creates a pod with two containers:
#   - gateway: runs `gateway run --verbose` (port 8642)
#   - dashboard: runs `dashboard --host 0.0.0.0 --insecure` (port 9119)

apiVersion: core.hermes.io/v1
kind: HermesAgent
metadata:
  name: my-hermes-agent
spec:
  # Required: AI model name
  model: kimi-k2.5

  # Required: model provider
  provider: kimi-coding-cn

  # Required: reference to Secret with API key
  # Create the secret first:
  # kubectl create secret generic kimi-api-key --from-literal=api-key=your-api-key
  apiSecretRef:
    name: kimi-api-key
    # namespace: default  # optional, defaults to same namespace

  # Optional: API endpoint (defaults to https://api.moonshot.cn/v1)
  # baseURL: https://api.openai.com/v1

  # Optional: max conversation turns (defaults to 90)
  # maxTurns: 90

  # Optional: personality preset (defaults to "kawaii")
  # Available: kawaii, helpful, concise, technical, creative, teacher, etc.
  # personality: kawaii

  # Optional: container image (defaults to docker.io/nousresearch/hermes-agent:latest)
  # image: docker.io/nousresearch/hermes-agent:latest

  # Optional: gateway port (defaults to 8642)
  # gatewayPort: 8642

  # Optional: dashboard port (defaults to 9119)
  # dashboardPort: 9119

  # Optional: gateway compute resources (defaults: 2 CPU, 4Gi memory)
  # gatewayResources:
  #   requests:
  #     memory: "1Gi"
  #     cpu: "500m"
  #   limits:
  #     memory: "4Gi"
  #     cpu: "2"

  # Optional: dashboard compute resources (defaults: 500m CPU, 512Mi memory)
  # dashboardResources:
  #   requests:
  #     memory: "128Mi"
  #     cpu: "100m"
  #   limits:
  #     memory: "512Mi"
  #     cpu: "500m"
