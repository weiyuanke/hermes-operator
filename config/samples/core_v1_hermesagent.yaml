# HermesAgent example
#
# This creates a Deployment with up to three containers:
#   - gateway:   runs `gateway run --verbose`            (default port 8642)
#   - dashboard: runs `dashboard --host 0.0.0.0 --insecure` (default port 9119)
#   - webui:     Open WebUI, connects to gateway via OpenAI API (optional, enabled by setting webUIPort)
#
# On first boot an init container copies .env / config.yaml / SOUL.md from a
# ConfigMap into a PVC mounted at /opt/data/. Files that already exist are
# skipped so that in-place edits survive pod restarts.

apiVersion: core.hermes.io/v1
kind: HermesAgent
metadata:
  name: my-hermes-agent
spec:
  # Container image for gateway and dashboard containers.
  # +optional, defaults to docker.io/nousresearch/hermes-agent:v2026.4.16
  image: docker.io/nousresearch/hermes-agent:v2026.4.16

  # Port the gateway listens on.
  # +optional, defaults to 8642
  gatewayPort: 8642

  # Port the dashboard listens on.
  # +optional, defaults to 9119
  dashboardPort: 9119

  # Raw content of /opt/data/.env written by the init container on first boot.
  # +optional
  env: |
    API_SERVER_ENABLED=true
    API_SERVER_HOST=0.0.0.0
    API_SERVER_KEY=your-secret-key-here

  # Raw content of /opt/data/config.yaml written by the init container on first boot.
  # +optional
  # configYaml: |
  #   model: hermes-3
  #   provider: openai

  # Raw content of /opt/data/SOUL.md written by the init container on first boot.
  # +optional
  # soulMd: |
  #   You are a helpful assistant.

  # Storage class for the PVC that backs /opt/data.
  # Leave empty to use the cluster default storage class.
  # +optional
  # storageClassName: standard

  # Size of the PVC that backs /opt/data.
  # +optional, defaults to 1Gi
  # storageSize: "1Gi"

  # Compute resources for the gateway container.
  # +optional, defaults: requests 500m/1Gi, limits 2/4Gi
  # gatewayResources:
  #   requests:
  #     cpu: "500m"
  #     memory: "1Gi"
  #   limits:
  #     cpu: "2"
  #     memory: "4Gi"

  # Compute resources for the dashboard container.
  # +optional, defaults: requests 100m/128Mi, limits 500m/512Mi
  # dashboardResources:
  #   requests:
  #     cpu: "100m"
  #     memory: "128Mi"
  #   limits:
  #     cpu: "500m"
  #     memory: "512Mi"

  # --- Open WebUI (optional) ---
  # Set webUIPort to a non-zero value to add an Open WebUI container
  # (ghcr.io/open-webui/open-webui:main) that connects to the gateway via the
  # OpenAI-compatible API at http://localhost:<gatewayPort>/v1.
  # +optional
  # webUIPort: 8080

  # API key passed to Open WebUI as OPENAI_API_KEY.
  # Should match API_SERVER_KEY set in env above.
  # +optional
  # webUIApiKey: your-secret-key-here

  # Compute resources for the Open WebUI container.
  # +optional, defaults: requests 100m/256Mi, limits 500m/1Gi
  # webUIResources:
  #   requests:
  #     cpu: "100m"
  #     memory: "256Mi"
  #   limits:
  #     cpu: "500m"
  #     memory: "1Gi"
