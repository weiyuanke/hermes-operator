# Minimal HermesAgent example
# Only 3 required fields needed to start an agent:
#   - model: AI model name
#   - provider: model provider
#   - apiSecretRef.name: name of Secret containing API key

apiVersion: core.hermes.io/v1
kind: HermesAgent
metadata:
  name: my-hermes-agent
spec:
  # Required: AI model name
  model: kimi-k2.5

  # Required: model provider
  provider: kimi-coding-cn

  # Required: reference to Secret with API key
  # Create the secret first:
  # kubectl create secret generic kimi-api-key --from-literal=api-key=your-api-key
  apiSecretRef:
    name: kimi-api-key
    # namespace: default  # optional, defaults to same namespace

  # Optional: API endpoint (defaults to https://api.moonshot.cn/v1)
  # baseURL: https://api.openai.com/v1

  # Optional: max conversation turns (defaults to 90)
  # maxTurns: 90

  # Optional: personality preset (defaults to "kawaii")
  # Available: kawaii, helpful, concise, technical, creative, teacher, etc.
  # personality: kawaii

  # Optional: container image (defaults to ghcr.io/aisuko/hermes:latest)
  # image: ghcr.io/aisuko/hermes:latest

  # Optional: service port (defaults to 8000)
  # servicePort: 8000

  # Optional: compute resources
  # resources:
  #   requests:
  #     memory: "512Mi"
  #     cpu: "500m"
  #   limits:
  #     memory: "1Gi"
  #     cpu: "1000m"
