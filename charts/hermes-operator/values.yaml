# Default values for hermes-operator.

# Operator manager image
image:
  repository: docker.io/weiyuanke/hermes-operator
  tag: "0.0.1"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Operator Deployment
operator:
  replicas: 1
  leaderElect: true
  healthProbeBindAddress: ":8081"

# REST API server embedded in the operator
apiServer:
  enabled: true
  port: 8090

# Service exposing the operator REST API
service:
  type: ClusterIP

# Operator pod resource requests/limits
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Pod-level security context for the operator
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container-level security context for the operator manager
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# CRD lifecycle
crds:
  install: true
  # When true, CRDs are NOT deleted on `helm uninstall`
  keep: true

# RBAC
rbac:
  create: true
