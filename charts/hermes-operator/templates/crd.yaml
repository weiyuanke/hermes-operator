{{- if .Values.crds.install }}
{{- range (lookup "v1" "Namespace" "" "").items }}
{{- if eq .metadata.name (printf "%s-crd" (include "hermes-operator.name" . | trimPrefix "hermes-operator-")) }}
{{- "Found existing CRD namespace, skipping CRD namespace creation" }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "hermes-operator.name" . }}-crd
  labels:
    app.kubernetes.io/name: {{ include "hermes-operator.name" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: hermesagents.core.hermes.io
spec:
  group: core.hermes.io
  names:
    kind: HermesAgent
    listKind: HermesAgentList
    plural: hermesagents
    singular: hermesagent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: AI model
      jsonPath: .spec.model
      name: Model
      type: string
    - description: Model provider
      jsonPath: .spec.provider
      name: Provider
      type: string
    - description: Current phase
      jsonPath: .status.phase
      name: Status
      type: string
    - description: Service endpoint
      jsonPath: .status.endpoint
      name: Endpoint
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: HermesAgent is the Schema for the hermesagents API
        properties:
          apiVersion:
            description: APIVersion defines the versioned schema of this representation of an object.
            type: string
          kind:
            description: Kind is a string value representing the REST resource this object represents.
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of HermesAgent
            properties:
              apiSecretRef:
                description: APISecretRef is the reference to a Kubernetes Secret containing the API key.
                properties:
                  key:
                    default: api-key
                    description: Key is the key in the Secret data. Defaults to "api-key".
                    type: string
                  name:
                    description: Name is the name of the Secret.
                    type: string
                  namespace:
                    description: Namespace is the namespace of the Secret.
                    type: string
                required:
                - name
                type: object
              baseURL:
                default: https://api.moonshot.cn/v1
                description: BaseURL is the API endpoint for the model provider.
                type: string
              image:
                default: ghcr.io/aisuko/hermes:latest
                description: Image is the container image for Hermes agent.
                type: string
              maxTurns:
                default: 90
                description: MaxTurns is the maximum number of conversation turns.
                type: integer
              model:
                description: Model is the AI model name to use.
                type: string
              personality:
                default: kawaii
                description: Personality is the agent's personality preset.
                type: string
              provider:
                description: Provider is the model provider name.
                type: string
              resources:
                description: Resources defines the compute resources for the Hermes agent pod.
                properties:
                  claims:
                    description: Claims lists the names of resources, defined in spec.resourceClaims, that are used by this container.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: Name must match the name of one entry in pod.spec.resourceClaims of the Pod where this field is used.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: 'Limits describes the maximum amount of compute resources allowed.'
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Requests describes the minimum amount of compute resources required.
                    type: object
                type: object
              servicePort:
                default: 8000
                description: ServicePort is the port where the Hermes agent service will listen.
                maximum: 65535
                minimum: 1
                type: integer
            required:
            - apiSecretRef
            - model
            - provider
            type: object
          status:
            description: status defines the observed state of HermesAgent
            properties:
              conditions:
                description: conditions represent the current state of the HermesAgent resource.
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another.
                      format: date-time
                      type: string
                    message:
                      description: message is a human readable message indicating details about the transition.
                      type: string
                    reason:
                      description: reason for the condition's last transition.
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              endpoint:
                description: Endpoint is the HTTP endpoint where the Hermes agent can be accessed.
                type: string
              phase:
                description: Phase is the current phase of the Hermes agent.
                type: string
              podIP:
                description: PodIP is the IP address of the Hermes agent Pod.
                type: string
              podName:
                description: PodName is the name of the Hermes agent Pod.
                type: string
              serviceName:
                description: ServiceName is the name of the Service exposing the Hermes agent.
                type: string
              servicePort:
                description: ServicePort is the port where the Hermes agent service is exposed.
                type: integer
              startedAt:
                description: StartedAt is the time when the Hermes agent was started.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
