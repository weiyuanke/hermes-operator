{{- if .Values.crds.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hermesagents.core.hermes.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
  labels:
    {{- include "hermes-operator.labels" . | nindent 4 }}
spec:
  group: core.hermes.io
  names:
    kind: HermesAgent
    listKind: HermesAgentList
    plural: hermesagents
    singular: hermesagent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Current phase
      jsonPath: .status.phase
      name: Status
      type: string
    - description: Gateway endpoint
      jsonPath: .status.gatewayEndpoint
      name: Gateway
      type: string
    - description: Dashboard endpoint
      jsonPath: .status.dashboardEndpoint
      name: Dashboard
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: HermesAgent is the Schema for the hermesagents API
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of HermesAgent
            properties:
              configYaml:
                description: Raw content of /opt/data/config.yaml written on first boot.
                type: string
              dashboardPort:
                default: 9119
                description: Port the dashboard container listens on.
                maximum: 65535
                minimum: 1
                type: integer
              dashboardResources:
                description: Compute resources for the dashboard container.
                properties:
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    type: object
                type: object
              env:
                description: Raw content of /opt/data/.env written on first boot.
                type: string
              gatewayPort:
                default: 8642
                description: Port the gateway container listens on.
                maximum: 65535
                minimum: 1
                type: integer
              gatewayResources:
                description: Compute resources for the gateway container.
                properties:
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    type: object
                type: object
              image:
                default: docker.io/nousresearch/hermes-agent:v2026.4.16
                description: Container image for gateway and dashboard containers.
                type: string
              soulMd:
                description: Raw content of /opt/data/SOUL.md written on first boot.
                type: string
              storageClassName:
                description: Storage class for the PVC backing /opt/data. Empty uses cluster default.
                type: string
              storageSize:
                default: 1Gi
                description: Size of the PVC backing /opt/data.
                type: string
              webUIApiKey:
                description: API key passed to Open WebUI as OPENAI_API_KEY.
                type: string
              webUIPort:
                description: Port exposed by the Open WebUI Service. Set to 0 to disable.
                maximum: 65535
                minimum: 0
                type: integer
              webUIResources:
                description: Compute resources for the Open WebUI container.
                properties:
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    type: object
                type: object
            type: object
          status:
            description: status defines the observed state of HermesAgent
            properties:
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              dashboardEndpoint:
                type: string
              dashboardPort:
                type: integer
              deploymentName:
                type: string
              gatewayEndpoint:
                type: string
              gatewayPort:
                type: integer
              loadBalancerIngress:
                type: string
              loadBalancerServiceName:
                type: string
              phase:
                type: string
              readyReplicas:
                format: int32
                type: integer
              serviceName:
                type: string
              startedAt:
                format: date-time
                type: string
              webUIEndpoint:
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
