{{- if .Values.rbac.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hermes-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermes-operator.labels" . | nindent 4 }}
---
# Leader election Role (namespace-scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "hermes-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermes-operator.labels" . | nindent 4 }}
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hermes-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermes-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "hermes-operator.fullname" . }}-leader-election
subjects:
- kind: ServiceAccount
  name: {{ include "hermes-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
---
# Manager ClusterRole — mirrors config/rbac/role.yaml exactly
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "hermes-operator.fullname" . }}-manager
  labels:
    {{- include "hermes-operator.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["configmaps", "persistentvolumeclaims", "services"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["core.hermes.io"]
  resources: ["hermesagents"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["core.hermes.io"]
  resources: ["hermesagents/finalizers"]
  verbs: ["update"]
- apiGroups: ["core.hermes.io"]
  resources: ["hermesagents/status"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "hermes-operator.fullname" . }}-manager
  labels:
    {{- include "hermes-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "hermes-operator.fullname" . }}-manager
subjects:
- kind: ServiceAccount
  name: {{ include "hermes-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
