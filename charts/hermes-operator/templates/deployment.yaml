apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: {{ include "hermes-operator.name" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hermes-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    control-plane: controller-manager
    {{- include "hermes-operator.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      {{- include "hermes-operator.selectorLabels" . | nindent 6 }}
  replicas: {{ .Values.operator.replicas }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        {{- include "hermes-operator.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "hermes-operator.fullname" . }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: manager
        image: {{ include "hermes-operator.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /manager
        args:
          - --leader-elect={{ .Values.operator.leaderElect }}
          - --health-probe-bind-address={{ .Values.operator.healthProbeBindAddress }}
          {{- if .Values.apiServer.enabled }}
          - --api-server-port={{ .Values.apiServer.port }}
          {{- end }}
        {{- if .Values.operator.logLevel }}
          - --zap-log-level={{ .Values.operator.logLevel }}
        {{- end }}
        ports:
        {{- if .Values.apiServer.enabled }}
        - name: api
          containerPort: {{ .Values.apiServer.port }}
          protocol: TCP
        {{- end }}
        {{- if .Values.prometheus.enabled }}
        - name: metrics
          containerPort: {{ .Values.service.metricsPort }}
          protocol: TCP
        {{- end }}
        {{- if .Values.prometheus.enabled }}
        livenessProbe:
          httpGet:
            path: /metrics
            port: {{ .Values.service.metricsPort }}
        {{- else }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.operator.healthProbeBindAddress }}
        {{- end }}
          initialDelaySeconds: 15
          periodSeconds: 20
        {{- if .Values.prometheus.enabled }}
        readinessProbe:
          httpGet:
            path: /metrics
            port: {{ .Values.service.metricsPort }}
        {{- else }}
        readinessProbe:
          httpGet:
            path: /readyz
            port: {{ .Values.operator.healthProbeBindAddress }}
        {{- end }}
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.containerSecurityContext | nindent 10 }}
